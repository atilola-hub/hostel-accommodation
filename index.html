<!DOCTYPE html>
<html lang="en"
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Hostel Accomodation Form</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<h1>Hostel Accomondation Form</h1>
<h2>Personal Information</h2>
<label>Full Name :</label> <input type="text" name="fullname" required />
<br><br>
<label>Matric Number :</label> <input type="text" name="matric" required />
<br><br>
<div class="row">
  <div><label>Email :</label> <input type="email" name="email" required /></div>
  <br><br>
  <div>
    <label>Phone Number :</label> <input type="tel" name="phone" required />
    <br><br>
  </div>
</div>
<div class="row">
  <div>
    <label>Date of Birth :</label> <input type="date" name="dob" required />
    <br><br>
  </div>
  <div>
    <label>Gender :</label>
    <br><br>
    <select name="gender" required>
      <option value="">Select</option>
      <option>Male</option>
      <option>Female</option>
    </select>
  </div>
</div>
<label>Department :</label> <input type="text" name="department" required />
<br><br>
<label>Level</label>
<br><br>
<select name="level" required>
  <option value="">Select Level</option>
  <option>100</option>
  <option>200</option>
  <option>300</option>
  <option>400</option>
  <option>500</option>
  <br><br>
</select>
<h3>Hostel Information</h3>
<label>Hostel Preference</label>
<select name="hostel" required>
  <option value="">Select Hostel</option>
  <option>Hostel A</option>
  <option>Hostel B</option>
  <option>Hostel C</option>
  <option>Hostel D</option>
  
  <br><br>
</select>
<br><br>
<label>Room Type :</label>
<div class="radio">
  <label
    ><input type="radio" name="room_type" value="single" /> Single
    Room</label>
  <label
    ><input type="radio" name="room_type" value="self-contained" />
    Self-contained</label
  >
  <label><input type="radio" name="room_type" value="flat" /> Flat</label>
</div>
<label>Medical Condition</label>
<textarea
  name="medical"
  rows="4"
  placeholder="State any medical condition"
></textarea>
<label>Upload Passport Photograph</label>
<input type="file" name="photo" accept="image/*" required /> <br /><br />
<button type="submit">Submit Application</button>
</body>
